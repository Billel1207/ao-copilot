name: Admin — Upgrade Plan to Business

on:
  workflow_dispatch:
    inputs:
      org_id:
        description: 'Organization UUID'
        required: true
        default: '23fb05be-8fc3-4b43-8676-b16f5da3c786'
      plan:
        description: 'Plan cible'
        required: true
        default: 'business'

jobs:
  upgrade:
    name: Upgrade Plan via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Upgrade plan via Docker exec
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /opt/ao-copilot
            docker compose exec -T api python -c "
            from app.database import SyncSessionLocal
            from app.models.organization import Organization
            import uuid
            db = SyncSessionLocal()
            org = db.query(Organization).filter_by(id=uuid.UUID('${{ github.event.inputs.org_id }}')).first()
            if org:
                old = org.plan
                org.plan = '${{ github.event.inputs.plan }}'
                org.quota_docs = 99999
                db.commit()
                print(f'OK: {org.name} (slug={org.slug}) plan: {old} -> {org.plan}, quota: 99999')
            else:
                print('ERREUR: org non trouvee')
            db.close()
            "
