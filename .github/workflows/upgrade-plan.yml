name: Admin — Upgrade Plan to Business

on:
  workflow_dispatch:
    inputs:
      org_id:
        description: 'Organization UUID'
        required: true
        default: '23fb05be-8fc3-4b43-8676-b16f5da3c786'
      plan:
        description: 'Plan cible'
        required: true
        default: 'business'

jobs:
  upgrade:
    name: Upgrade Plan via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Upgrade plan via Docker exec
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /opt/ao-copilot
            docker compose exec -T api python -c "
            from sqlalchemy import create_engine, text
            import os
            url = os.environ.get('DATABASE_URL_SYNC', 'postgresql://aocopilot:aocopilot_secret@db:5432/aocopilot')
            engine = create_engine(url)
            with engine.connect() as conn:
                # List all users first
                rows = conn.execute(text('SELECT u.email, u.org_id, o.name, o.slug, o.plan FROM users u JOIN organizations o ON u.org_id = o.id')).fetchall()
                for r in rows:
                    print(f'USER: {r[0]} | org={r[2]} ({r[3]}) | plan={r[4]}')
                # Upgrade all orgs to business
                result = conn.execute(text(\"UPDATE organizations SET plan='business', quota_docs=99999 WHERE plan != 'business'\"))
                conn.commit()
                print(f'UPGRADED {result.rowcount} org(s) to business')
            "

