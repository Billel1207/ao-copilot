name: CI — AO Copilot

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # Backend — Tests Python (FastAPI + Pytest)
  # ──────────────────────────────────────────────
  test-backend:
    name: Test Backend (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aocopilot
          POSTGRES_PASSWORD: aocopilot_secret
          POSTGRES_DB: aocopilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aocopilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://aocopilot:aocopilot_secret@localhost:5432/aocopilot_test
      DATABASE_URL_SYNC: postgresql://aocopilot:aocopilot_secret@localhost:5432/aocopilot_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: ci-test-secret-key-minimum-32-characters
      APP_ENV: development
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      S3_BUCKET_NAME: test-bucket
      S3_REGION: fr-par
      ANTHROPIC_API_KEY: sk-ant-test-placeholder
      OPENAI_API_KEY: sk-test-placeholder
      LLM_MODEL: claude-sonnet-4-6
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
      RESEND_API_KEY: re_test_placeholder
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install system dependencies (Tesseract OCR)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-fra \
            tesseract-ocr-eng \
            poppler-utils

      - name: Install Python dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest apps/api/tests -v --tb=short

  # ──────────────────────────────────────────────
  # Frontend — Tests Vitest (Next.js)
  # ──────────────────────────────────────────────
  test-frontend:
    name: Test Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

  # ──────────────────────────────────────────────
  # Docker — Build images (validation)
  # ──────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          tags: ao-copilot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: false
          tags: ao-copilot-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.ao-copilot.fr
          cache-from: type=gha
          cache-to: type=gha,mode=max
