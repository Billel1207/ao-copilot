<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hors connexion — AO Copilot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-radius: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.75rem;
    }
    p {
      color: #64748b;
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: linear-gradient(to right, #1e3a8a, #1d4ed8);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>Vous êtes hors connexion</h1>
    <p>
      AO Copilot nécessite une connexion internet pour analyser vos documents
      et synchroniser vos projets. Vérifiez votre connexion et réessayez.
    </p>
    <button onclick="window.location.reload()">Réessayer</button>
    <p class="hint">La page se rechargera automatiquement quand la connexion sera rétablie.</p>
  </div>

  <script>
    // Auto-reload when back online
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
