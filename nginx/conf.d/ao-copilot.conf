# ─── Étape 1 : HTTP → HTTPS redirect + Let's Encrypt challenge ───────────────
server {
    listen 80;
    server_name ao-copilot.fr www.ao-copilot.fr;

    # Validation Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Rediriger tout le reste vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Étape 2 : HTTPS ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ao-copilot.fr www.ao-copilot.fr;

    ssl_certificate /etc/letsencrypt/live/ao-copilot.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ao-copilot.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS — force HTTPS pendant 2 ans, includeSubDomains + preload
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # API FastAPI
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Docs Swagger (désactiver en prod si souhaité)
    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_set_header Host $host;
    }

    # Frontend Next.js
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cache statique Next.js (1 an, immutable)
    location /_next/static/ {
        proxy_pass http://frontend:3000/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
