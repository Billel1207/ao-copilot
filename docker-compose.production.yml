version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AO Copilot — Docker Compose PRODUCTION (Hostinger VPS)
# Utilisation : docker compose -f docker-compose.production.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 + pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aocopilot_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aocopilot}
      POSTGRES_USER: ${POSTGRES_USER:-aocopilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aocopilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NE PAS exposer le port 5432 en production
    expose:
      - "5432"

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aocopilot_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: aocopilot_api:latest
    container_name: aocopilot_api
    restart: always
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aocopilot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aocopilot}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-aocopilot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aocopilot}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: aocopilot_api:latest
    container_name: aocopilot_worker
    restart: always
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aocopilot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aocopilot}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-aocopilot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aocopilot}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      python -m celery -A app.worker.celery_app worker
      --loglevel=info
      --concurrency=2

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://votre-domaine.com/api/v1}
    image: aocopilot_frontend:latest
    container_name: aocopilot_frontend
    restart: always
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      - api

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: aocopilot_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend

  # ── Certbot (SSL Let's Encrypt) ────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: aocopilot_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renouvellement auto toutes les 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:
