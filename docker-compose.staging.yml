# ═══════════════════════════════════════════════════════════════════════════════
# AO Copilot — Staging Environment
# Usage: docker compose -f docker-compose.staging.yml up -d
# Mirrors production but with reduced resources and debug logging.
# ═══════════════════════════════════════════════════════════════════════════════
version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aocopilot_staging_pg
    environment:
      POSTGRES_DB: aocopilot_staging
      POSTGRES_USER: aocopilot
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:-staging_secret_change_me}
    ports:
      - "5433:5432"
    volumes:
      - staging_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aocopilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: aocopilot_staging_redis
    ports:
      - "6380:6379"
    volumes:
      - staging_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  minio:
    image: minio/minio:latest
    container_name: aocopilot_staging_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STAGING_S3_KEY:-staging_minio}
      MINIO_ROOT_PASSWORD: ${STAGING_S3_SECRET:-staging_minio_secret}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - staging_minio_data:/data

  # ── API FastAPI ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aocopilot_staging_api
    ports:
      - "8001:8000"
    env_file: .env.staging
    environment:
      APP_ENV: staging
      DATABASE_URL: postgresql+asyncpg://aocopilot:${STAGING_DB_PASSWORD:-staging_secret_change_me}@postgres:5432/aocopilot_staging
      DATABASE_URL_SYNC: postgresql://aocopilot:${STAGING_DB_PASSWORD:-staging_secret_change_me}@postgres:5432/aocopilot_staging
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
      SENTRY_ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aocopilot_staging_worker
    env_file: .env.staging
    environment:
      APP_ENV: staging
      DATABASE_URL: postgresql+asyncpg://aocopilot:${STAGING_DB_PASSWORD:-staging_secret_change_me}@postgres:5432/aocopilot_staging
      DATABASE_URL_SYNC: postgresql://aocopilot:${STAGING_DB_PASSWORD:-staging_secret_change_me}@postgres:5432/aocopilot_staging
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      python -m celery -A app.worker.celery_app worker
      --loglevel=info
      --concurrency=1
      -P prefork
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aocopilot_staging_beat
    env_file: .env.staging
    environment:
      APP_ENV: staging
      DATABASE_URL_SYNC: postgresql://aocopilot:${STAGING_DB_PASSWORD:-staging_secret_change_me}@postgres:5432/aocopilot_staging
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      python -m celery -A app.worker.celery_app beat
      --loglevel=info

volumes:
  staging_pg_data:
  staging_redis_data:
  staging_minio_data:
