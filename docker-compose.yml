version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aocopilot_postgres
    environment:
      POSTGRES_DB: aocopilot
      POSTGRES_USER: aocopilot
      POSTGRES_PASSWORD: aocopilot_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aocopilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aocopilot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aocopilot_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aocopilot_minio
      MINIO_ROOT_PASSWORD: aocopilot_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API FastAPI (inclut Tesseract OCR via Dockerfile) ──────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aocopilot_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aocopilot:aocopilot_secret@postgres:5432/aocopilot
      DATABASE_URL_SYNC: postgresql://aocopilot:aocopilot_secret@postgres:5432/aocopilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ── Celery Worker (même image que l'API) ───────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aocopilot_worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aocopilot:aocopilot_secret@postgres:5432/aocopilot
      DATABASE_URL_SYNC: postgresql://aocopilot:aocopilot_secret@postgres:5432/aocopilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    command: >
      python -m celery -A app.worker.celery_app worker
      --loglevel=info
      --concurrency=2
      -P prefork

volumes:
  postgres_data:
  redis_data:
  minio_data:
